name = "wind-trainer-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "wind-trainer-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
FIREBASE_PROJECT_ID = "REPLACE_WITH_FIREBASE_PROJECT_ID"
# Restrict this to the deployed frontend origin once the custom domain is set.
# e.g. "https://horn.example.com" or "https://shunnishi84.github.io"
ALLOWED_ORIGIN = "https://shunnishi84.github.io"
